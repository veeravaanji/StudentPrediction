<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Performance Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="card shadow-lg">

        <div class="card-header">

            <h2>🎓 Student Performance Prediction</h2>

            <p>Machine Learning Based Prediction System</p>

        </div>

        <div class="card-body">

            <form action="/predict" method="POST">

                <div class="mb-3">

                    <label class="form-label">Study Hours Per Week</label>

                    <input type="number" class="form-control" name="study_hours" required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Attendance Rate (%)</label>

                    <input type="number" class="form-control" name="attendance" required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Past Exam Score</label>

                    <input type="number" class="form-control" name="past_exam_score" required>

                </div>

                <button class="btn btn-primary w-100">
                    Predict
                </button>

            </form>

            {% if prediction %}

            <div class="alert alert-success mt-4 text-center">

                <h3>{{ prediction }}</h3>

            </div>

            {% endif %}

        </div>

    </div>

</div>

</body>

</html>
