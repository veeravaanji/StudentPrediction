<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Performance Prediction</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(135deg,#4e73df,#224abe);

font-family:Arial,Helvetica,sans-serif;

min-height:100vh;

padding:40px;

}

.card{

border:none;

border-radius:20px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

}

.title{

font-weight:bold;

color:#224abe;

}

.form-label{

font-weight:600;

}

.btn{

border-radius:10px;

font-weight:bold;

}

.result-card{

border-radius:15px;

padding:20px;

margin-top:25px;

text-align:center;

}

.pass{

background:#d4edda;

color:#155724;

}

.fail{

background:#f8d7da;

color:#721c24;

}

.progress{

height:25px;

border-radius:30px;

}

canvas{

max-height:350px;

}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card p-4">
    <!-- Home Button -->

<div class="d-flex justify-content-start mb-3">

    <a href="{{ url_for('home') }}" class="btn btn-primary">

        <i class="bi bi-house-door-fill"></i>

        Home

    </a>

</div>

<h2 class="text-center title mb-4">

<i class="bi bi-mortarboard-fill"></i>

Student Performance Prediction

</h2>

<form action="/predict" method="POST">

<!-- Student Information -->

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

<i class="bi bi-person-fill"></i>

Student Name

</label>

<input
type="text"
class="form-control"
name="student_name"
placeholder="Enter Student Name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

<i class="bi bi-card-text"></i>

Student ID

</label>

<input
type="text"
class="form-control"
name="student_id"
placeholder="Enter Student ID"
required>

</div>

</div>

<!-- Gender -->

<div class="mb-3">

<label class="form-label">

<i class="bi bi-gender-ambiguous"></i>

Gender

</label>

<select
class="form-select"
name="gender"
required>

<option value="">Select Gender</option>

<option value="Male">Male</option>

<option value="Female">Female</option>

</select>

</div>

<!-- Study Hours -->

<div class="mb-3">

<label class="form-label">

<i class="bi bi-book-half"></i>

Study Hours Per Week

</label>

<input
type="number"
step="0.1"
min="0"
max="60"
class="form-control"
name="study_hours"
placeholder="Example : 25"
required>

</div>

<!-- Attendance -->

<div class="mb-3">

<label class="form-label">

<i class="bi bi-calendar-check-fill"></i>

Attendance Percentage

</label>

<input
type="number"
step="0.1"
min="0"
max="100"
class="form-control"
name="attendance"
placeholder="Example : 90"
required>

</div>

<div class="mb-3">

<label class="form-label">
<i class="bi bi-moon-fill"></i>
Sleep Hours Per Night
</label>

<input
type="number"
step="0.1"
min="0"
max="12"
class="form-control"
name="sleep_hours"
placeholder="Example : 8"
required>

</div>

<div class="mb-3">

<label class="form-label">
<i class="bi bi-wifi"></i>
Internet Access at Home
</label>

<select
class="form-select"
name="internet_access"
required>

<option value="">Select</option>

<option value="Yes">Yes</option>

<option value="No">No</option>

</select>

</div>

<!-- Previous Exam Score -->

<div class="mb-3">

<label class="form-label">

<i class="bi bi-award-fill"></i>

Previous Exam Score

</label>

<input
type="number"
step="0.1"
min="0"
max="100"
class="form-control"
name="past_exam_score"
placeholder="Example : 78"
required>

</div>

<!-- Extracurricular Activity -->

<div class="mb-4">

<label class="form-label">

<i class="bi bi-trophy-fill"></i>

Extracurricular Activity

</label>

<select
class="form-select"
name="extracurricular"
required>

<option value="">Select Option</option>

<option value="Yes">Yes</option>

<option value="No">No</option>

</select>

</div>

<div class="d-grid gap-2">

<button
type="submit"
class="btn btn-primary">

<i class="bi bi-cpu-fill"></i>

Predict Performance

</button>

<button
type="reset"
class="btn btn-secondary">

<i class="bi bi-arrow-clockwise"></i>

Reset

</button>

</div>

</form>

<!-- Prediction Result -->

{% if prediction %}

<div class="result-card mt-4 {% if prediction=='Pass' %}pass{% else %}fail{% endif %}">

    {% if prediction=="Pass" %}

    <div class="display-1 text-success">
        <i class="bi bi-check-circle-fill"></i>
    </div>

    {% else %}

    <div class="display-1 text-danger">
        <i class="bi bi-x-circle-fill"></i>
    </div>

    {% endif %}

    <h2 class="mt-3">

        Prediction :
        <strong>{{ prediction }}</strong>

    </h2>

    <h5 class="mt-3">

    Confidence : {{ confidence }}%

</h5>

<div class="progress mt-3" style="height:30px;">

    <div
        class="progress-bar {% if prediction == 'Pass' %}bg-success{% else %}bg-danger{% endif %}"
        role="progressbar"
        style="width: {{ confidence }}%;"
        aria-valuenow="{{ confidence }}"
        aria-valuemin="0"
        aria-valuemax="100">

        {{ confidence }}%

    </div>

</div>
    <!-- Suggestion -->

    <div class="alert alert-info mt-4">

        <strong>Suggestion :</strong>

        {{ suggestion }}

    </div>

</div>


<!-- Student Comparison Chart -->

<div class="card mt-4 shadow">

<div class="card-header bg-primary text-white">

<h5 class="mb-0">

<i class="bi bi-bar-chart-fill"></i>

Student Performance Comparison

</h5>

</div>

<div class="card-body">

<canvas id="comparisonChart"></canvas>

</div>

</div>

{% endif %}


</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


{% if prediction %}

<script>

const studyHours = Number("{{ study_hours }}");
const attendance = Number("{{ attendance }}");
const sleepHours = Number("{{ sleep_hours }}");
const previousScore = Number("{{ past_exam_score }}");

// Convert Yes/No to numeric
const extracurricular = "{{ extracurricular }}";
const extracurricularValue = extracurricular === "Yes" ? 1 : 0;

const ctx = document.getElementById("comparisonChart").getContext("2d");

new Chart(ctx, {

    type: "bar",

    data: {

      labels: [

    "Study Hours",

    "Attendance",

    "Sleep Hours",

    "Previous Score",

    "Extracurricular"

],

        datasets: [

            {
                label: "Student",

              data: [

    studyHours,

    attendance,

    sleepHours,

    previousScore,

    extracurricularValue

]
            },

            {
                label: "Recommended",

               data: [

    25,

    90,

    8,

    75,

    1

]
            }

        ]

    },

    options: {

        responsive: true,

        plugins: {

            legend: {

                position: "top"

            },

            title: {

                display: true,

                text: "Student vs Recommended Values"

            }

        },

        scales: {

            y: {

                beginAtZero: true,

                max: 100,

                ticks: {

                    callback: function(value){

                        if(value==1)
                            return "Yes";

                        if(value==0)
                            return "No";

                        return value;
                    }

                }

            }

        }

    }

});

</script>

{% endif %}

</body>

</html>
